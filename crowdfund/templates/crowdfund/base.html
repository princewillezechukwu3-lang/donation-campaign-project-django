{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GiveNaija — Donation Campaigns{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'crowdfund/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{% url 'campaign_list' %}" class="brand">💛 GiveNaija</a>
            <nav><a href="{% url 'campaign_list' %}">Campaigns</a></nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">Built with Django &amp; Django REST Framework</div>
    </footer>
</body>
</html>
